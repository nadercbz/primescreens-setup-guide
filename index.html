<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeScreens · Setup Handbuch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --petrol:#4E97A8;
  --petrol-deep:#2E6B79;
  --petrol-dark:#1C4750;
  --ink:#14252B;
  --ink-soft:#3C5158;
  --cream:#FBF8F1;
  --paper:#FFFFFF;
  --orange:#F0512B;
  --orange-soft:#FDE4DB;
  --yellow:#F6C544;
  --yellow-soft:#FEF3D2;
  --mint:#CFE8E5;
  --line:#E7E1D6;
  --shadow:0 18px 50px -22px rgba(20,37,43,.45);
  --shadow-sm:0 8px 24px -14px rgba(20,37,43,.4);
  --r-xl:34px;
  --r-lg:26px;
  --r-md:18px;
  --r-sm:12px;
  --serif:'Bricolage Grotesque', sans-serif;
  --body:'Manrope','Noto Sans KR', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--body);
  color:var(--ink);
  background:var(--petrol);
  background-image:
    radial-gradient(120% 80% at 100% 0%, rgba(246,197,68,.22), transparent 55%),
    radial-gradient(120% 90% at 0% 100%, rgba(28,71,80,.55), transparent 50%);
  background-attachment:fixed;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
:lang(ko), [data-lang-active="ko"] body{font-family:'Noto Sans KR','Manrope',sans-serif}
.font-ko{font-family:'Noto Sans KR','Manrope',sans-serif}

/* ============ START SCREEN ============ */
#start{
  position:fixed;inset:0;z-index:60;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(140% 120% at 85% 10%, rgba(246,197,68,.28), transparent 50%),
    radial-gradient(120% 120% at 10% 90%, rgba(240,81,43,.35), transparent 45%),
    linear-gradient(160deg,#3C8497,#1C4750);
  overflow:hidden;
  transition:opacity .7s ease, visibility .7s;
}
#start.hide{opacity:0;visibility:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5;animation:float 14s ease-in-out infinite}
.blob.b1{width:340px;height:340px;background:radial-gradient(circle at 30% 30%,#6FBFCB,transparent 70%);top:-80px;left:-60px}
.blob.b2{width:280px;height:280px;background:radial-gradient(circle at 40% 40%,#F6C544,transparent 70%);bottom:-60px;right:8%;animation-delay:-4s}
.blob.b3{width:200px;height:200px;background:radial-gradient(circle at 40% 40%,#F0512B,transparent 70%);top:18%;right:14%;animation-delay:-8s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-30px) scale(1.08)}}
.start-inner{position:relative;z-index:2;text-align:center;padding:32px;max-width:680px;width:100%}
.brand-mark{
  display:inline-flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(8px);
  padding:9px 18px 9px 12px;border-radius:100px;margin-bottom:34px;
  color:#fff;font-weight:700;letter-spacing:.02em;font-size:14px;
  opacity:0;animation:rise .8s .1s forwards;
}
.brand-dot{width:26px;height:26px;border-radius:8px;background:var(--orange);display:grid;place-items:center}
.brand-dot svg{width:15px;height:15px;color:#fff}
.start-inner h1{
  font-family:var(--serif);color:#fff;font-weight:800;
  font-size:clamp(40px,7vw,76px);line-height:.98;letter-spacing:-.02em;
  margin-bottom:18px;text-wrap:balance;
  opacity:0;animation:rise .8s .22s forwards;
}
.start-inner h1 .em{color:var(--yellow);font-style:italic}
.start-sub{
  color:rgba(255,255,255,.85);font-size:clamp(16px,2.2vw,19px);font-weight:500;
  max-width:480px;margin:0 auto 40px;line-height:1.5;min-height:58px;
  opacity:0;animation:rise .8s .34s forwards;
}
.lang-pick{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:34px;opacity:0;animation:rise .8s .46s forwards}
.lang-card{
  cursor:pointer;border:2px solid rgba(255,255,255,.28);background:rgba(255,255,255,.1);
  backdrop-filter:blur(6px);border-radius:var(--r-md);padding:20px 24px;min-width:150px;
  color:#fff;transition:.28s cubic-bezier(.34,1.4,.64,1);position:relative;overflow:hidden;
}
.lang-card:hover{transform:translateY(-5px);border-color:#fff;background:rgba(255,255,255,.18)}
.lang-card.sel{background:#fff;color:var(--ink);border-color:#fff;transform:translateY(-5px)}
.lang-card .flag{font-size:30px;line-height:1;margin-bottom:10px;display:block}
.lang-card .ln{font-family:var(--serif);font-weight:700;font-size:20px}
.lang-card .lnsub{font-size:12.5px;opacity:.7;margin-top:2px;font-weight:600}
.lang-card .check{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--orange);display:grid;place-items:center;opacity:0;transform:scale(.4);transition:.25s}
.lang-card.sel .check{opacity:1;transform:scale(1)}
.lang-card .check svg{width:13px;height:13px;color:#fff}
.start-btn{
  border:none;cursor:pointer;font-family:var(--serif);font-weight:700;font-size:18px;
  color:#fff;background:var(--orange);padding:16px 40px;border-radius:100px;
  display:inline-flex;align-items:center;gap:10px;
  box-shadow:0 16px 36px -12px rgba(240,81,43,.7);
  transition:.25s;opacity:0;animation:rise .8s .58s forwards;
}
.start-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 22px 44px -12px rgba(240,81,43,.8)}
.start-btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.4);box-shadow:none;transform:none}
.start-btn svg{width:20px;height:20px;transition:transform .25s}
.start-btn:hover:not(:disabled) svg{transform:translateX(4px)}
@keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* ============ APP SHELL ============ */
.app{max-width:1320px;margin:0 auto;padding:22px clamp(14px,3vw,30px) 60px;opacity:0;transition:opacity .6s .2s}
.app.show{opacity:1}
header.bar{
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-radius:var(--r-lg);padding:14px 18px;box-shadow:var(--shadow);
  position:sticky;top:14px;z-index:30;margin-bottom:22px;border:1px solid rgba(255,255,255,.6);
}
.logo{display:flex;align-items:center;gap:11px;font-family:var(--serif);font-weight:800;font-size:18px;color:var(--ink);white-space:nowrap}
.logo .dot{width:34px;height:34px;border-radius:11px;background:var(--orange);display:grid;place-items:center;flex-shrink:0}
.logo .dot svg{width:19px;height:19px;color:#fff}
.logo small{display:block;font-family:var(--body);font-weight:600;font-size:11px;color:var(--petrol-deep);letter-spacing:.04em;text-transform:uppercase;margin-top:1px}
.search{flex:1;min-width:200px;position:relative;display:flex;align-items:center}
.search svg{position:absolute;left:16px;width:18px;height:18px;color:var(--ink-soft);pointer-events:none}
.search input{
  width:100%;border:1.5px solid var(--line);background:var(--cream);
  border-radius:100px;padding:12px 16px 12px 44px;font-family:var(--body);font-size:15px;color:var(--ink);
  transition:.2s;font-weight:500;
}
.search input:focus{outline:none;border-color:var(--petrol);background:#fff;box-shadow:0 0 0 4px rgba(78,151,168,.14)}
.lang-switch{display:flex;gap:4px;background:var(--cream);border-radius:100px;padding:4px;border:1.5px solid var(--line)}
.lang-switch button{
  border:none;background:none;cursor:pointer;font-family:var(--body);font-weight:700;font-size:13px;
  color:var(--ink-soft);padding:8px 13px;border-radius:100px;transition:.2s;
}
.lang-switch button.on{background:var(--ink);color:#fff}
.lang-switch button:hover:not(.on){color:var(--ink)}

/* progress bar */
.topprog{height:6px;border-radius:100px;background:rgba(255,255,255,.35);overflow:hidden;margin-bottom:22px;box-shadow:inset 0 1px 3px rgba(0,0,0,.1)}
.topprog .fill{height:100%;width:0;border-radius:100px;background:linear-gradient(90deg,var(--yellow),var(--orange));transition:width .6s cubic-bezier(.4,0,.2,1)}

.layout{display:grid;grid-template-columns:312px 1fr;gap:22px;align-items:start}

/* ============ SIDEBAR / OVERVIEW ============ */
.side{
  background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-radius:var(--r-lg);padding:22px 16px;box-shadow:var(--shadow);
  position:sticky;top:96px;max-height:calc(100vh - 116px);overflow-y:auto;border:1px solid rgba(255,255,255,.6);
}
.side h2{font-family:var(--serif);font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--petrol-deep);padding:0 8px 6px}
.side-prog{font-size:12px;color:var(--ink-soft);padding:0 8px 14px;font-weight:600}
.phase{margin-bottom:6px}
.phase-label{
  display:flex;align-items:center;gap:8px;font-family:var(--serif);font-weight:700;font-size:12px;
  text-transform:uppercase;letter-spacing:.05em;color:var(--ink);padding:14px 8px 7px;
}
.phase-label .ph-dot{width:7px;height:7px;border-radius:50%;background:var(--orange)}
.phase:nth-of-type(2) .ph-dot{background:var(--yellow)}
.phase:nth-of-type(3) .ph-dot{background:var(--petrol)}
.phase:nth-of-type(4) .ph-dot{background:var(--ink)}
.nav-item{
  display:flex;align-items:center;gap:11px;cursor:pointer;
  padding:9px 10px;border-radius:13px;transition:.18s;margin-bottom:2px;border:1.5px solid transparent;
}
.nav-item:hover{background:var(--cream)}
.nav-item.active{background:var(--ink);border-color:var(--ink)}
.nav-item.active .ni-num{background:var(--orange);color:#fff}
.nav-item.active .ni-title{color:#fff}
.ni-num{
  width:26px;height:26px;border-radius:8px;flex-shrink:0;background:var(--cream);
  display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--ink-soft);transition:.18s;border:1.5px solid var(--line);
}
.nav-item.done .ni-num{background:var(--petrol);color:#fff;border-color:var(--petrol)}
.nav-item.done.active .ni-num{background:var(--orange);border-color:var(--orange)}
.ni-num svg{width:14px;height:14px}
.ni-title{font-size:13.5px;font-weight:600;color:var(--ink-soft);line-height:1.25}
.nav-item:hover .ni-title{color:var(--ink)}
.no-results{padding:20px 10px;font-size:13.5px;color:var(--ink-soft);text-align:center;font-weight:500}

/* ============ CONTENT ============ */
.stage{min-height:60vh}
.card{
  background:var(--paper);border-radius:var(--r-xl);padding:clamp(26px,4vw,46px);
  box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.7);position:relative;overflow:hidden;
}
.card::before{content:"";position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle at 70% 30%,var(--yellow-soft),transparent 70%);opacity:.7;pointer-events:none}
.step-anim{animation:stepIn .5s cubic-bezier(.22,1,.36,1)}
@keyframes stepIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.step-head{display:flex;align-items:flex-start;gap:20px;margin-bottom:8px;position:relative;z-index:1}
.step-num{
  flex-shrink:0;width:74px;height:74px;border-radius:22px;
  background:linear-gradient(150deg,var(--orange),#D63E1C);color:#fff;
  display:grid;place-items:center;font-family:var(--serif);font-weight:800;font-size:30px;
  box-shadow:0 14px 30px -12px rgba(240,81,43,.7);position:relative;
}
.step-num .ic{position:absolute;bottom:-9px;right:-9px;width:32px;height:32px;border-radius:11px;background:#fff;display:grid;place-items:center;box-shadow:var(--shadow-sm)}
.step-num .ic svg{width:17px;height:17px;color:var(--orange)}
.step-eyebrow{font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--petrol-deep);margin-bottom:6px}
.step-head h1{font-family:var(--serif);font-weight:800;font-size:clamp(26px,3.6vw,40px);line-height:1.04;letter-spacing:-.02em;color:var(--ink)}
.step-intro{font-size:clamp(15.5px,1.9vw,18px);color:var(--ink-soft);line-height:1.6;margin:18px 0 26px;max-width:62ch;font-weight:500;position:relative;z-index:1}

.steps-list{list-style:none;display:flex;flex-direction:column;gap:2px;position:relative;z-index:1}
.steps-list li{
  display:flex;gap:16px;align-items:flex-start;padding:15px 4px;border-bottom:1px solid var(--line);
}
.steps-list li:last-child{border-bottom:none}
.sl-num{
  flex-shrink:0;width:30px;height:30px;border-radius:9px;background:var(--cream);border:1.5px solid var(--line);
  display:grid;place-items:center;font-weight:800;font-size:14px;color:var(--petrol-deep);margin-top:1px;
}
.sl-text{font-size:16px;line-height:1.55;color:var(--ink);font-weight:500;padding-top:3px}
.sl-text b{color:var(--ink);font-weight:800;background:var(--yellow-soft);padding:1px 7px;border-radius:7px;white-space:nowrap}

/* callouts */
.note{display:flex;gap:14px;padding:16px 18px;border-radius:var(--r-md);margin-top:22px;position:relative;z-index:1;font-weight:500}
.note .ni{flex-shrink:0;width:34px;height:34px;border-radius:11px;display:grid;place-items:center}
.note .ni svg{width:19px;height:19px}
.note .nt{font-size:15px;line-height:1.5}
.note .nt strong{display:block;font-family:var(--serif);font-size:13px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.note.tip{background:var(--mint)}
.note.tip .ni{background:var(--petrol);color:#fff}
.note.tip .nt strong{color:var(--petrol-deep)}
.note.warning{background:var(--orange-soft)}
.note.warning .ni{background:var(--orange);color:#fff}
.note.warning .nt strong{color:var(--orange)}
.note.info{background:var(--yellow-soft)}
.note.info .ni{background:var(--yellow);color:var(--ink)}
.note.info .nt strong{color:#A87B12}

.link-box{display:flex;align-items:center;gap:13px;margin-top:22px;background:var(--ink);color:#fff;padding:15px 18px;border-radius:var(--r-md);position:relative;z-index:1;text-decoration:none;transition:.22s}
.link-box:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.link-box .li{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.14);display:grid;place-items:center;flex-shrink:0}
.link-box .li svg{width:19px;height:19px}
.link-box .lt{flex:1;min-width:0}
.link-box .lt small{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--yellow);font-weight:700;margin-bottom:2px}
.link-box .lt span{font-size:14.5px;font-weight:600;word-break:break-all}
.link-box .arr{flex-shrink:0}
.link-box .arr svg{width:18px;height:18px;color:var(--yellow)}

/* footer nav */
.foot{display:flex;align-items:center;gap:14px;margin-top:26px}
.done-btn{
  flex:1;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--ink);
  font-family:var(--body);font-weight:700;font-size:15px;padding:15px 20px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;gap:9px;transition:.2s;
}
.done-btn:hover{border-color:var(--petrol);background:var(--cream)}
.done-btn.is-done{background:var(--petrol);border-color:var(--petrol);color:#fff}
.done-btn svg{width:18px;height:18px}
.nav-btn{
  cursor:pointer;border:none;font-family:var(--serif);font-weight:700;font-size:15px;
  padding:15px 22px;border-radius:var(--r-md);display:inline-flex;align-items:center;gap:9px;transition:.22s;white-space:nowrap;
}
.nav-btn svg{width:18px;height:18px}
.nav-btn.prev{background:var(--cream);color:var(--ink);border:1.5px solid var(--line)}
.nav-btn.prev:hover{background:#fff;transform:translateX(-3px)}
.nav-btn.next{background:var(--orange);color:#fff;box-shadow:0 12px 26px -12px rgba(240,81,43,.7)}
.nav-btn.next:hover{transform:translateX(3px);box-shadow:0 16px 30px -12px rgba(240,81,43,.8)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* finish card */
.finish-banner{display:none;margin-top:22px;background:linear-gradient(150deg,var(--petrol),var(--petrol-dark));color:#fff;border-radius:var(--r-lg);padding:26px 28px;align-items:center;gap:18px;position:relative;z-index:1}
.finish-banner.show{display:flex;animation:stepIn .5s}
.finish-banner .fi{width:54px;height:54px;border-radius:16px;background:var(--yellow);display:grid;place-items:center;flex-shrink:0}
.finish-banner .fi svg{width:28px;height:28px;color:var(--ink)}
.finish-banner h3{font-family:var(--serif);font-size:21px;margin-bottom:4px}
.finish-banner p{font-size:14.5px;opacity:.85;font-weight:500}

.mobtoggle{display:none}

@media(max-width:920px){
  .layout{grid-template-columns:1fr}
  .side{position:static;max-height:none;display:none;margin-bottom:0;top:auto}
  .side.open{display:block;animation:stepIn .35s}
  .mobtoggle{display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;border:1.5px solid var(--line);background:rgba(255,255,255,.92);backdrop-filter:blur(10px);color:var(--ink);font-family:var(--serif);font-weight:700;font-size:14.5px;padding:15px 18px;border-radius:var(--r-md);margin-bottom:14px;width:100%}
  .mobtoggle .mt-left{display:flex;align-items:center;gap:9px}
  .mobtoggle svg{width:18px;height:18px}
  .mobtoggle .chev{transition:transform .3s;color:var(--petrol-deep)}
  .mobtoggle.open .chev{transform:rotate(180deg)}
  header.bar{position:static}
}
/* tablet / large phone */
@media(max-width:680px){
  .app{padding:14px 13px 50px}
  header.bar{padding:12px 13px;gap:12px;border-radius:var(--r-md)}
  .logo{order:1}
  .lang-switch{order:2;margin-left:auto}
  .search{order:3;flex-basis:100%;min-width:0}
  .search input{padding:13px 16px 13px 44px;font-size:16px}
  .card{padding:24px 20px;border-radius:var(--r-lg)}
  .card::before{width:130px;height:130px}
  .step-head{gap:14px}
  .step-num{width:58px;height:58px;font-size:23px;border-radius:17px}
  .step-num .ic{width:27px;height:27px;border-radius:9px;bottom:-7px;right:-7px}
  .step-num .ic svg{width:14px;height:14px}
  .step-eyebrow{font-size:11px}
  .step-intro{margin:14px 0 20px}
  .steps-list li{padding:13px 0;gap:13px}
  .sl-text{font-size:15.5px}
  .sl-text b{white-space:normal}
  .note{padding:14px 15px}
  .link-box .lt span{font-size:13px}
}
/* small phone */
@media(max-width:480px){
  .foot{flex-wrap:wrap;gap:10px}
  .nav-btn{flex:1;justify-content:center;padding:15px 14px}
  .done-btn{order:-1;flex-basis:100%}
  .start-inner{padding:24px 18px}
  .lang-pick{gap:10px}
  .lang-card{min-width:0;flex:1;padding:16px 12px}
  .lang-card .flag{font-size:26px}
  .lang-card .ln{font-size:17px}
  .lang-card .lnsub{font-size:11px}
  .brand-mark{margin-bottom:24px;font-size:13px}
  .start-sub{margin-bottom:30px}
  .start-btn{width:100%;justify-content:center}
}
/* taller tap targets on touch devices */
@media(hover:none){
  .nav-item{padding:12px 10px}
  .lang-switch button{padding:10px 14px}
}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;border:3px solid transparent;background-clip:padding-box}
</style>
</head>
<body>

<!-- ============ START SCREEN ============ -->
<section id="start">
  <span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span>
  <div class="start-inner">
    <div class="brand-mark"><span class="brand-dot"><i data-lucide="monitor"></i></span> PrimeScreens · Mmaah</div>
    <h1 id="startTitle">Display <span class="em">Setup</span></h1>
    <p class="start-sub" id="startSub"></p>
    <div class="lang-pick" id="langPick">
      <div class="lang-card" data-l="de"><span class="flag">🇩🇪</span><div class="ln">Deutsch</div><div class="lnsub">German</div><span class="check"><i data-lucide="check"></i></span></div>
      <div class="lang-card" data-l="en"><span class="flag">🇬🇧</span><div class="ln">English</div><div class="lnsub">Englisch</div><span class="check"><i data-lucide="check"></i></span></div>
      <div class="lang-card" data-l="ko"><span class="flag">🇰🇷</span><div class="ln font-ko">한국어</div><div class="lnsub">Korean</div><span class="check"><i data-lucide="check"></i></span></div>

  en:{t:"Confirm boot, restart & test",intro:"Final touch and functional test.",steps:["Again <b>Home</b> → <b>Configuration 1</b> → <b>Boot on Source</b>.","Click <b>Off</b> and select <b>Custom</b>.","Turn everything off and <b>restart</b>.","Check that everything works."],finish:true},
  ko:{t:"부팅 확인, 재시작 및 테스트",intro:"마지막 점검 및 작동 테스트.",steps:["다시 <b>홈</b> → <b>Configuration 1</b> → <b>Boot on Source</b>.","<b>Off</b>를 클릭하고 <b>Custom</b>을 선택합니다.","모두 끄고 <b>재시작</b>합니다.","모든 것이 작동하는지 확인합니다."],finish:true}}
];

/* ============ STATE ============ */
let lang = 'de';
let current = 0;
let done = JSON.parse(localStorage.getItem('ps_done')||'{}');
let pendingLang = null;

const $ = s=>document.querySelector(s);
const icon = (n)=>`<i data-lucide="${n}"></i>`;
const refreshIcons = ()=>{ if(window.lucide) lucide.createIcons(); };

/* ============ START SCREEN ============ */
function renderStart(l){
  $('#startSub').textContent = UI[l].sub;
  if(!pendingLang){ $('#startBtnTxt').textContent = UI[l].pickLang; }
}
document.querySelectorAll('#langPick .lang-card').forEach(c=>{
  c.addEventListener('mouseenter',()=>{ if(!pendingLang) renderStart(c.dataset.l); });
  c.addEventListener('mouseleave',()=>{ if(!pendingLang) renderStart('de'); });
  c.addEventListener('click',()=>{
    pendingLang = c.dataset.l;
    document.querySelectorAll('#langPick .lang-card').forEach(x=>x.classList.remove('sel'));
    c.classList.add('sel');
    $('#startBtn').disabled = false;
    $('#startBtnTxt').textContent = UI[pendingLang].btn;
    renderStart(pendingLang);
  });
});
$('#startBtn').addEventListener('click',()=>{
  if(!pendingLang) return;
  lang = pendingLang;
  $('#start').classList.add('hide');
  $('#app').classList.add('show');
  document.documentElement.lang = lang;
  buildAll();
  setTimeout(refreshIcons,50);
});
renderStart('de');

/* ============ BUILD ============ */
function buildAll(){
  // lang switch active
  document.querySelectorAll('#langSwitch button').forEach(b=>b.classList.toggle('on',b.dataset.l===lang));
  $('#logoSub').textContent = UI[lang].logoSub;
  $('#searchInput').placeholder = UI[lang].search;
  $('#sideTitle').textContent = UI[lang].overview;
  $('#mobToggleTxt').textContent = UI[lang].mobile;
  document.body.classList.toggle('font-ko', lang==='ko');
  buildNav();
  renderStep(current);
  updateProgress();
}

function buildNav(filter){
  const list = $('#navList');
  list.innerHTML='';
  const q = (filter||'').trim().toLowerCase();
  let lastPhase = -1, any=false;
  STEPS.forEach((s,i)=>{
    const d = s[lang];
    const hay = (d.t+' '+d.intro+' '+d.steps.join(' ')).toLowerCase();
    if(q && !hay.includes(q)) return;
    any=true;
    if(s.phase!==lastPhase){
      lastPhase=s.phase;
      const ph=document.createElement('div');
      ph.className='phase';
      ph.innerHTML=`<div class="phase-label"><span class="ph-dot"></span>${PHASES[lang][s.phase]}</div>`;
      list.appendChild(ph);
    }
    const item=document.createElement('div');
    item.className='nav-item'+(i===current?' active':'')+(done[i]?' done':'');
    item.innerHTML=`<span class="ni-num">${done[i]?icon('check'):(i+1)}</span><span class="ni-title">${d.t}</span>`;
    item.addEventListener('click',()=>{ go(i); if(window.innerWidth<=920){ $('#side').classList.remove('open'); $('#mobToggle').classList.remove('open'); } });
    // append to last phase block
    list.lastElementChild.classList.contains('phase') ? list.lastElementChild.appendChild(item) : list.appendChild(item);
  });
  if(!any){ list.innerHTML=`<div class="no-results">${UI[lang].noRes}</div>`; }
  refreshIcons();
}

function renderStep(i){
  const s=STEPS[i], d=s[lang];
  const total=STEPS.length;
  let html=`<div class="step-anim">
    <div class="step-head">
      <div class="step-num">${i+1}<span class="ic">${icon(s.icon)}</span></div>
      <div>
        <div class="step-eyebrow">${UI[lang].eyebrow} ${i+1} / ${total} · ${PHASES[lang][s.phase]}</div>
        <h1>${d.t}</h1>
      </div>
    </div>
    <p class="step-intro">${d.intro}</p>
    <ul class="steps-list">`;
  d.steps.forEach((st,n)=>{ html+=`<li><span class="sl-num">${n+1}</span><span class="sl-text">${st}</span></li>`; });
  html+=`</ul>`;
  if(d.note){
    const ni={tip:'lightbulb',info:'info',warning:'alert-triangle'}[d.note.type];
    html+=`<div class="note ${d.note.type}"><span class="ni">${icon(ni)}</span><div class="nt"><strong>${d.note.t}</strong>${d.note.x}</div></div>`;
  }
  if(d.link){
    html+=`<a class="link-box" href="${d.link.url}" target="_blank" rel="noopener"><span class="li">${icon('link')}</span><div class="lt"><small>${UI[lang].linkLabel}</small><span>${d.link.url}</span></div><span class="arr">${icon('external-link')}</span></a>`;
  }
  if(d.finish){
    html+=`<div class="finish-banner${done[i]?' show':''}"><span class="fi">${icon('party-popper')}</span><div><h3>${UI[lang].finishT}</h3><p>${UI[lang].finishP}</p></div></div>`;
  }
  // footer
  html+=`<div class="foot">
    <button class="nav-btn prev" ${i===0?'disabled':''} onclick="go(${i-1})">${icon('arrow-left')}${UI[lang].prev}</button>
    <button class="done-btn ${done[i]?'is-done':''}" onclick="toggleDone(${i})">${done[i]?icon('check-circle'):icon('circle')}${done[i]?UI[lang].undone:UI[lang].done}</button>
    <button class="nav-btn next" ${i===total-1?'disabled':''} onclick="go(${i+1})">${UI[lang].next}${icon('arrow-right')}</button>
  </div></div>`;
  $('#card').innerHTML=html;
  refreshIcons();
}

function go(i){
  if(i<0||i>=STEPS.length) return;
  current=i;
  renderStep(i);
  buildNav($('#searchInput').value);
  $('#card').scrollIntoView({behavior:'smooth',block:'start'});
}
function toggleDone(i){
  done[i]=!done[i];
  localStorage.setItem('ps_done',JSON.stringify(done));
  renderStep(i);
  buildNav($('#searchInput').value);
  updateProgress();
}
function updateProgress(){
  const total=STEPS.length;
  const d=Object.values(done).filter(Boolean).length;
  $('#progFill').style.width=(d/total*100)+'%';
  $('#sideProg').textContent=UI[lang].progress({d,t:total});
}

/* ============ EVENTS ============ */
$('#searchInput').addEventListener('input',e=>buildNav(e.target.value));
document.querySelectorAll('#langSwitch button').forEach(b=>{
  b.addEventListener('click',()=>{ lang=b.dataset.l; document.documentElement.lang=lang; buildAll(); });
});
$('#mobToggle').addEventListener('click',()=>{
  const open=$('#side').classList.toggle('open');
  $('#mobToggle').classList.toggle('open',open);
});
document.addEventListener('keydown',e=>{
  if($('#searchInput')===document.activeElement) return;
  if($('#start').classList.contains('hide')){
    if(e.key==='ArrowRight') go(current+1);
    if(e.key==='ArrowLeft') go(current-1);
  }
});
window.go=go; window.toggleDone=toggleDone;
refreshIcons();
</script>
</body>
</html>
